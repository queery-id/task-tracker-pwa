<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1419">
  <title>Task Detail - Task Tracker</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-detail">
  <!-- Timer Progress Strip -->
  <div class="timer-strip"></div>

  <!-- Header -->
  <header class="detail-header">
    <button data-nav="/dashboard.html" class="btn btn-ghost btn-icon" aria-label="Kembali">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <h1 id="taskTitle" class="task-title">Task Title</h1>
  </header>

  <!-- Main Content -->
  <main class="detail-content">
    <!-- Progress Section -->
    <section class="card">
      <div class="card-header flex-between">
        <h2>Progress</h2>
        <span id="progressText" class="badge">0/0 selesai</span>
      </div>
      <div class="progress">
        <div id="progressBar" class="progress-bar" style="width: 0%"></div>
      </div>
    </section>

    <!-- Sub-tasks Section -->
    <section class="card" style="margin-top: var(--spacing-md);">
      <h2>Sub-tugas</h2>
      <ul id="subtaskList" class="subtask-list">
        <!-- Subtasks will be rendered here -->
      </ul>
    </section>

    <!-- Actions Section -->
    <section style="margin-top: var(--spacing-lg);">
      <button id="markCompleteBtn" class="btn btn-success btn-block">
        Tandai Task Selesai
      </button>
      <button id="deleteTaskBtn" class="btn btn-danger btn-block" style="margin-top: var(--spacing-sm);">
        Hapus Task
      </button>
    </section>
  </main>

  <!-- Add Subtask Form (Sticky Bottom) -->
  <form id="addSubtaskForm" class="add-subtask-form">
    <input
      type="text"
      id="newSubtaskInput"
      class="input"
      placeholder="Tambah sub-tugas..."
      autocomplete="off"
    >
    <button type="submit" class="btn btn-primary">+</button>
  </form>

  <!-- Scripts -->
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/store.js"></script>
  <script type="module" src="/js/timer.js"></script>
  <script type="module" src="/js/ui.js"></script>
  <script type="module" src="/js/wakeup.js"></script>

  <!-- Auth Guard & Detail Page Init -->
  <script type="module">
    import Auth from './js/auth.js';
    import Store from './js/store.js';
    import UI from './js/ui.js';
    import WakeUp from './js/wakeup.js';

    // Auth Guard: Redirect to login if not authenticated
    if (!Auth.hasSession()) {
      window.location.href = '/index.html';
    }

    // Get taskId from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const taskId = urlParams.get('task');

    if (!taskId) {
      console.error('No taskId provided');
      window.location.href = '/dashboard.html';
    } else {
      // Initialize Store and UI
      UI.init(Store);

      // Initialize WakeUp overlay system
      WakeUp.init(Store);

      // Render detail page
      UI.renderDetailPage(taskId);

      // Request notification permission
      Timer.requestNotificationPermission();

      // Add subtask form handler
      const addSubtaskForm = document.getElementById('addSubtaskForm');
      const newSubtaskInput = document.getElementById('newSubtaskInput');

      if (addSubtaskForm && newSubtaskInput) {
        addSubtaskForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const label = newSubtaskInput.value.trim();
          if (label) {
            UI.handleAddSubtask(taskId, label);
            newSubtaskInput.value = '';
            newSubtaskInput.focus();
          }
        });

        // Auto-focus input on load
        newSubtaskInput.focus();
      }

      // Mark complete button handler
      const markCompleteBtn = document.getElementById('markCompleteBtn');
      if (markCompleteBtn) {
        markCompleteBtn.addEventListener('click', () => {
          UI.handleMarkComplete(taskId);
        });
      }

      // Delete task button handler
      const deleteTaskBtn = document.getElementById('deleteTaskBtn');
      if (deleteTaskBtn) {
        deleteTaskBtn.addEventListener('click', () => {
          UI.handleDeleteTaskFromDetail(taskId);
        });
      }

      // Back button navigation
      const backBtn = document.querySelector('[data-nav="/dashboard.html"]');
      if (backBtn) {
        backBtn.addEventListener('click', (e) => {
          e.preventDefault();
          window.location.href = '/dashboard.html';
        });
      }

      // Expose to console for testing
      window.taskId = taskId;
      window.Store = Store;
      window.UI = UI;
      console.log('Detail page initialized for task:', taskId);
    }
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then((reg) => console.log('Service Worker registered:', reg.scope))
        .catch((err) => console.error('Service Worker registration failed:', err));
    }
  </script>
</body>
</html>
