<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1419">
  <title>Dashboard - Task Tracker</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-dashboard">
  <!-- Timer Progress Strip -->
  <div class="timer-strip"></div>

  <!-- Header -->
  <header class="dashboard-header">
    <h1 class="app-name">TaskTracker</h1>
    <div class="timer-display" id="timerDisplay">30:00</div>
    <button id="logoutBtn" class="btn btn-ghost btn-icon" aria-label="Logout">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>
  </header>

  <!-- Main Content -->
  <main class="dashboard-content">
    <div id="taskGrid" class="task-grid">
      <!-- Task cards will be rendered here -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state hidden">
      <p>Belum ada task. Klik + untuk mulai.</p>
    </div>
  </main>

  <!-- Floating Action Button -->
  <button id="addTaskBtn" class="fab" aria-label="Tambah Task">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
  </button>

  <!-- Scripts -->
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/store.js"></script>
  <script type="module" src="/js/timer.js"></script>
  <script type="module" src="/js/ui.js"></script>
  <script type="module" src="/js/wakeup.js"></script>

  <!-- Auth Guard & Logout Handler -->
  <script type="module">
    import Auth from './js/auth.js';
    import Store from './js/store.js';
    import UI from './js/ui.js';
    import WakeUp from './js/wakeup.js';

    // Auth Guard: Redirect to login if not authenticated
    if (!Auth.hasSession()) {
      window.location.href = '/index.html';
    }

    // Logout handler
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', () => {
        if (confirm('Keluar dari aplikasi?')) {
          Auth.clearSession();
          window.location.href = '/index.html';
        }
      });
    }

    // Initialize Store and UI
    Store.seedData(); // Load seed data on first visit
    UI.init(Store);

    // Initialize WakeUp overlay system
    WakeUp.init(Store);

    // Render task cards
    UI.renderTaskCards();

    // Request notification permission
    Timer.requestNotificationPermission();

    // Add task button handler (inline input)
    const addTaskBtn = document.getElementById('addTaskBtn');
    if (addTaskBtn) {
      addTaskBtn.addEventListener('click', () => {
        const taskTitle = prompt('Nama task baru:');
        if (taskTitle && taskTitle.trim()) {
          Store.createTask(taskTitle.trim(), 'medium');
          UI.renderTaskCards();
        }
      });
    }

    // Expose to console for testing
    window.Store = Store;
    window.UI = UI;
    window.WakeUp = WakeUp;
    window.Timer = Timer;
    console.log('Dashboard initialized. Try: Store.getTasks()');
    console.log('Test wake-up overlay: WakeUp.showWakeUpOverlay()');
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then((reg) => console.log('Service Worker registered:', reg.scope))
        .catch((err) => console.error('Service Worker registration failed:', err));
    }
  </script>
</body>
</html>
